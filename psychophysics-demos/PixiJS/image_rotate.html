<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.13.2/pixi.min.js" integrity="sha512-rOMqai9NIPaFWpmvHUjdOa2dSuaaYo6i7E19jS1ZW9rjnrl4qAOOtsOeTk0QgIflFCe2ZYi/7or3CRF6VfBk9g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../../jspsych-dist/dist/jspsych.js"></script>
    <script src="../../jspsych-dist/dist/plugin-html-button-response.js"></script>
    <script src="../../jspsych-dist/dist/plugin-preload.js"></script>
    <script src="../../jspsych-psychophysics.js"></script>
    <link rel="stylesheet" href="../../jspsych-dist/dist/jspsych.css"></link>
</head>
<body></body>
<script>
    // This file demonstrates how to rotate images with pixi.js.

    (async () => {

        const jsPsych = initJsPsych({
            on_finish: function() {
                app.destroy(true, {
                    children: true,
                    texture: true,
                    baseTexture: true
                });
                jsPsych.data.displayData();
            }
        })

        const app = new PIXI.Application();
        await app.init({
            antialias: true 
        });

        console.log(`jsPsych Version ${jsPsych.version()}`)
        
        const instruction = {
            type: jsPsychHtmlButtonResponse,
            stimulus: 'Click on the Start button.',
            choices: ['Start'],
            prompt: "This is a sample program for the jspsych-psychophysics plugin.",
        }

        const images = [ // All the images used in this demo
            '../img/scissors.png',
        ];

        // Preloading files are needed to present the stimuli accurately.
        const preload = {
            type: jsPsychPreload,
            images: images,
        }
        
        const image = {
            obj_type: 'image',
            file: images[0]
        };

        const trial = {
            type: jsPsychPsychophysics,
            pixi_app: function() {
                return app;
            },
            key_down_func: function(event){

                // You can access PixiJS components via the children property. 
                // You may need to check the exact index of your target component by trial and error, 
                // as it won't necessarily be at index 0.
                
                const gabor = app.stage.children[0];
                if (event.key === 'ArrowLeft'){
                    gabor.angle += 1;
                } else if (event.key === 'ArrowRight'){
                    gabor.angle -= 1;
                }
            },
            stimuli: [image],
            canvas_height: 700,
            prompt: `<p>Press the ArrowLeft/ArrowRight key to rotate the image.</p>`,
            response_type: 'key',
            choices: [' ']
        }

        jsPsych.run([instruction, trial])
    })();

</script>

</html>
