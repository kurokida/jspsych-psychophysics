<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.13.2/pixi.min.js" integrity="sha512-rOMqai9NIPaFWpmvHUjdOa2dSuaaYo6i7E19jS1ZW9rjnrl4qAOOtsOeTk0QgIflFCe2ZYi/7or3CRF6VfBk9g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../../jspsych-dist/dist/jspsych.js"></script>
    <script src="../../jspsych-dist/dist/plugin-html-button-response.js"></script>
    <script src="../../jspsych-psychophysics.js"></script>
    <link rel="stylesheet" href="../../jspsych-dist/dist/jspsych.css"></link>
</head>
<body></body>
<script>
    // This file demonstrates how to present random dots with a circular mask with PixiJS.
    // Drawing random dots can be heavy, so the jspsychophysics plugin pre-renders them 
    // to ensure smooth experimental performance without any lag.

    (async () => {

        const jsPsych = initJsPsych({
            on_finish: function() {
                app.destroy(true, {
                    children: true,
                    texture: true,
                    baseTexture: true
                });
                jsPsych.data.displayData();
            }
        })    

        const app = new PIXI.Application();
        await app.init({});

        console.log(`jsPsych Version ${jsPsych.version()}`)
        
        const instruction = {
            type: jsPsychHtmlButtonResponse,
            stimulus: 'Click on the Start button.',
            choices: ['Start'],
            prompt: "This is a sample program for the jspsych-psychophysics plugin.",
        }

        const radius = 100;
        const mask = new PIXI.Graphics()
            .circle(0, 0, radius) // Note: The origin is set to the center of the random dot area.
            .fill(0xffffff); // Any color will work.

        const random_dot = {
            obj_type: 'random_dot',
            pixi_mask: function () {
                return mask;
            },
            random_dot_size: 5,
            random_dot_density: 0.5,
            random_dot_area_width: radius * 2,
            random_dot_area_height: radius * 2,
            random_dot_color: 'black',
            random_dot_background_color: 'white',
        }

        const trial = {
            type: jsPsychPsychophysics,
            pixi_app: function() {
                return app;
            },
            stimuli: [random_dot]
        }

        jsPsych.run([instruction, trial])
    })();

</script>

</html>
