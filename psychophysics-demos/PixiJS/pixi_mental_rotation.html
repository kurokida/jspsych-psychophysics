<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type"  content="text/html; charset=UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.13.2/pixi.min.js" integrity="sha512-rOMqai9NIPaFWpmvHUjdOa2dSuaaYo6i7E19jS1ZW9rjnrl4qAOOtsOeTk0QgIflFCe2ZYi/7or3CRF6VfBk9g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../../jspsych-dist/dist/jspsych.js"></script>
    <script src="../../jspsych-dist/dist/plugin-html-button-response.js"></script>
    <script src="../../jspsych-psychophysics.js"></script>
    <link rel="stylesheet" href="../../jspsych-dist/dist/jspsych.css"></link>
    <style>
        body {
            background-color: grey;
        }
      </style>
</head>
<body></body>
<script>
    // This file demonstrates how to present stimuli for a mental rotation task.
    
    (async () => {

        const jsPsych = initJsPsych({
            on_finish: function() {
                app.destroy(true, {
                    children: true,
                    texture: true,
                    baseTexture: true
                });
                jsPsych.data.displayData();
            }
        })    

        const app = new PIXI.Application();
        await app.init({});

        console.log(`jsPsych Version ${jsPsych.version()}`) 

        const experiment = [];

        const fixation = {
            obj_type: 'text',
            content: "+",
            fontSize: "60px",
            text_color: 'white',
            show_start_time: 0,
            show_end_time: 1000
        }

        const mr_trial = {
            type: jsPsychPsychophysics,
            pixi_app: function() {
                return app;
            },        
            stimuli: function() {
                const stim_char = {
                    obj_type: 'text',
                    content: function(){
                        return jsPsych.evaluateTimelineVariable('char')
                    },
                    fontSize: "60px",
                    text_color: 'white',
                    pixi_angle: function(){
                        console.log(jsPsych.evaluateTimelineVariable('rotAngle'))
                        return jsPsych.evaluateTimelineVariable('rotAngle')
                    },
                    show_start_time: 1000,
                }
                
                return [fixation, stim_char]
            },
            choices: ['ArrowLeft', 'ArrowRight'],
            canvas_height: 500,
            prompt: '<p>Press the left arrow key for "b" and the right arrow key for "d".</p>',
        }

        const main_trials = {
            timeline: [mr_trial],
            timeline_variables: [
                {char: "b", rotAngle: 0},
                {char: "b", rotAngle: 60},
                {char: "b", rotAngle: 120},
                {char: "b", rotAngle: 180},
                {char: "b", rotAngle: 240},
                {char: "b", rotAngle: 300},
                {char: "d", rotAngle: 0},
                {char: "d", rotAngle: 60},
                {char: "d", rotAngle: 120},
                {char: "d", rotAngle: 180},
                {char: "d", rotAngle: 240},
                {char: "d", rotAngle: 300},
            ],
            randomize_order: true,
            repetitions: 2
        }

        experiment.push(main_trials)

        jsPsych.run(experiment)
    })();

</script>

</html>
