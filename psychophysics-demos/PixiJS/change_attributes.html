<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.13.2/pixi.min.js" integrity="sha512-rOMqai9NIPaFWpmvHUjdOa2dSuaaYo6i7E19jS1ZW9rjnrl4qAOOtsOeTk0QgIflFCe2ZYi/7or3CRF6VfBk9g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../../jspsych-dist/dist/jspsych.js"></script>
    <script src="../../jspsych-dist/dist/plugin-html-button-response.js"></script>
    <script src="../../jspsych-psychophysics.js"></script>
    <link rel="stylesheet" href="../../jspsych-dist/dist/jspsych.css"></link>
</head>
<body></body>
<script>

    (async () => {

        const jsPsych = initJsPsych({
            on_finish: function() {
                app.destroy(true, {
                    children: true,
                    texture: true,
                    baseTexture: true
                });
                jsPsych.data.displayData();
            }
        })    

        const app = new PIXI.Application();
        await app.init({});

        console.log(`jsPsych Version ${jsPsych.version()}`)
        
        const instruction = {
            type: jsPsychHtmlButtonResponse,
            stimulus: 'Click on the Start button.',
            choices: ['Start'],
            prompt: "This is a sample program for the jspsych-psychophysics plugin."
        }

        let color = 0;

        const text_object = {
        obj_type: 'text',
        startX: 0,
        startY: 100,
        origin_center: true,
        content: 'RGB = [0, 0, 0]',
        font: "22px 'Arial'",
        text_color: 'white',
        change_attr: function(stim){ // Change the content dynamically
            const content = `RGB = [${color}, ${color}, ${color}]`;
            stim.pixi_obj.text = content
        } 
        }

        const rect_object = {
            obj_type: 'rect', // means a rectangle
            startX: 0, // location in the canvas
            startY: 0,
            origin_center: true,
            width: 100, // of the rectangle
            height: 100,
            line_color: 'rgb(0,0,0)',
            fill_color: 'rgb(0,0,0)',
            line_width: 4,
            change_attr: function(stim, times, frames){ // called by the requestAnimationFrame
                const frequency = 0.05;
                const sin_value = Math.sin(2 * Math.PI * frequency * times/1000) // The times are in terms of milliseconds
                const normalized_value = sin_value/2 + 1/2; // from 0 to 1
                color = Math.floor(normalized_value * 255) // An integer between 0 and 255
                const color_info = `rgb(${color}, ${color}, ${color})`

                stim.pixi_obj
                .rect(-stim.width / 2, -stim.height / 2, stim.width, stim.height)
                .fill({ color: color_info})
                .stroke({ 
                    color: stim.line_color,
                    width: stim.line_width
                });
            }
        }

        const trial = {
            type: jsPsychPsychophysics,
            pixi_app: function() {
                return app;
            },
            stimuli: [text_object, rect_object],
            choices: ['y', 'n'], // The participant can respond to the stimuli using the 'y' or 'n' key.
            prompt: "<p>Press 'y' or 'n' key to respond.</p>",
            canvas_width: 600,
            canvas_height: 600,
        }

        jsPsych.run([instruction, trial])
    })();

</script>

</html>
