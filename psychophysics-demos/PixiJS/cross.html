<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.13.2/pixi.min.js" integrity="sha512-rOMqai9NIPaFWpmvHUjdOa2dSuaaYo6i7E19jS1ZW9rjnrl4qAOOtsOeTk0QgIflFCe2ZYi/7or3CRF6VfBk9g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../../jspsych-dist/dist/jspsych.js"></script>
    <script src="../../jspsych-dist/dist/plugin-html-button-response.js"></script>
    <script src="../../jspsych-psychophysics.js"></script>
    <link rel="stylesheet" href="../../jspsych-dist/dist/jspsych.css"></link>
</head>
<body></body>
<script>
    // This file demonstrates how to present (fixation) cross.

    (async () => {

        const jsPsych = initJsPsych({
            on_finish: function() {
                app.destroy(true, {
                    children: true,
                    texture: true,
                    baseTexture: true
                });
                jsPsych.data.displayData();
            }
        })

        const app = new PIXI.Application();
        await app.init({});

        console.log(`jsPsych Version ${jsPsych.version()}`)
        
        const instruction = {
            type: jsPsychHtmlButtonResponse,
            stimulus: 'Click on the Start button.',
            choices: ['Start'],
            prompt: "This is a sample program for the jspsych-psychophysics plugin.",
        }

        const cross_object1 = {
            obj_type: 'cross',        
            startX: 200, // location of the cross's center in the canvas
            startY: 400,
            line_length: 50,
            line_color: 'black', // You can use the HTML color name instead of the HEX color.
            show_start_time: 500, // ms after the start of the trial
            endX: 400,
            endY: 400,
            motion_start_time: 1500,
            motion_end_time: 3000,
            origin_center: false,
        }

        const cross_object2 = {
            obj_type: 'cross',        
            startX: 400, // location of the cross's center in the canvas
            startY: 400,
            line_length: 100,
            line_color: 'red', // You can use the HTML color name instead of the HEX color.
            fill_color: 'white',
            show_start_time: 1000, // ms after the start of the trial
            motion_start_time: 1500,
            motion_end_time: 3000,
            vert_pix_frame: -2,
            origin_center: false,
        }

        const trial = {
            type: jsPsychPsychophysics,
            pixi_app: function() {
                return app;
            },
            stimuli: [cross_object1, cross_object2],
        }

        jsPsych.run([instruction, trial])
    })();

</script>

</html>
