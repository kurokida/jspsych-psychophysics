<!DOCTYPE html>
<html>
    <head>
      <script src="../jspsych-dist/dist/jspsych.js"></script>
      <script src="../jspsych-dist/dist/plugin-html-button-response.js"></script>
      <script src="../jspsych-psychophysics.js"></script>
      <link rel="stylesheet" href="../jspsych-dist/dist/jspsych.css"></link>
    </head>
    <body></body>
    <script>
      // This file demonstrates how to use keyboard events in the jspsych-psychophysics plugin.
      // In this demo, you can change the color of the circle by pressing the ArrowUp/ArrowDown key.

      const jsPsych = initJsPsych({
        on_finish: function() {
            jsPsych.data.displayData();
        }
      })

      const instruction = {
        type: jsPsychHtmlButtonResponse,
        stimulus: 'Click on the Start button.',
        choices: ['Start'],
        prompt: "This is a sample program for the jspsych-psychophysics plugin.",
      }


      let current_color = 0;
      const radius = 150;

      const circle_obj = {
          obj_type: 'circle',
          radius: radius,
          line_color: 'white',
          fill_color: `rgb(${current_color}, ${current_color}, ${current_color})`,
          line_width: 5,
      };

      const trial = {
          type: jsPsychPsychophysics,
          canvas_height: 500,
          prompt: '<p>Pressing the ArrowUp/ArrowDown key, the color of the circle will change. <br>Press the space key to finish the program.</p>',
          stimuli: [circle_obj], // These can be referenced using the jsPsych.currentTrial().stimuli array.
          response_type: 'key',
          choices: [' '],
          key_down_func: function(event, current_trial){ // The key_up_func is also available. In that case, the color of the circle changes when you release the key. 
            if (event.key === 'ArrowUp'){
              current_color += 10;
              if (current_color > 255) current_color = 255;
            } else if (event.key === 'ArrowDown'){
              current_color -= 10;
              if (current_color < 0) current_color = 0;
            }

            // Note that when specify the space bar, you need to write event.key === ' ' not event.key === 'space'.
            
            current_trial.stimuli[0].instance.fill_color = `rgb(${current_color}, ${current_color}, ${current_color})`;
          },
      }

    console.log(`jsPsych Version ${jsPsych.version()}`)
    jsPsych.run([instruction, trial])

</script>
</html>
