<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.8/browser/pixi.min.js"></script>
    <script src="../jspsych-psychophysics.js"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
    p {
        color: white;
    }
    body {
      background-color: black;
    }
    .text-white {
          color: white;
     }
  </style>
</head>
<body></body>
<script>
    // The accuracy of the psychophysics plugin was confirmed using this script.
    // See https://osf.io/pj4sb/

    const jsPsych = initJsPsych({})
    console.log(`jsPsych Version ${jsPsych.version()}`)

    const experiment = [];

    const sounds = [
        './sound/tone100ms.wav'
    ];

    const preload = {
        type: jsPsychPreload,
        audio: sounds,
    }

    const enter_fullscreen = {
        type: jsPsychFullscreen,
        fullscreen_mode: true,
    }

    experiment.push(preload)
    experiment.push(enter_fullscreen)

    const time_units = jsPsych.randomization.shuffle(["millisecond", "frame"]);
    const pixi_settings = jsPsych.randomization.shuffle([false, true]);

    pixi_settings.forEach(pixi_flag => {
        time_units.forEach(units => {
            let rect1;
            let rect2;
            let sound_object;

            if (units === "millisecond") {
                rect1 = {
                    obj_type: 'rect',
                    startX: 300,
                    startY: 200,
                    width: 100,
                    height: 100,
                    fill_color: 'white',
                    show_start_time: 500,
                    show_end_time: 550, // Rect1 is presented for 50 ms. 
                    is_frame: false,
                    origin_center: false,
                }

                rect2 = {
                    obj_type: 'rect',
                    startX: 800,
                    startY: 800,
                    width: 100,
                    height: 100,
                    fill_color: 'white',
                    show_start_time: 600,
                    show_end_time: 650, // Rect2 is presented for 50 ms, 100 ms after Rect1 is presented (i.e., SOA = 100 ms).
                    is_frame: false,
                    origin_center: false,
                }

                sound_object = {
                    obj_type: 'sound',
                    file: sounds[0],
                    show_start_time: 600, // The sound is presented for 100 ms, 100 ms after Rect1 is presented (i.e., SOA = 100 ms).
                    // In addition, the sound is presented at the same time of the onset of Rect2.
                    // Note that the duration of the sound is depend on the audio file.
                    is_frame: false
                }

            } else { // in terms of frames
                rect1 = {
                    obj_type: 'rect',
                    startX: 300,
                    startY: 200,
                    width: 100,
                    height: 100,
                    fill_color: 'white',
                    show_start_frame: 30,
                    show_end_frame: 33, // Rect1 is presented for 3 frames (50 ms). 
                    is_frame: true,
                    origin_center: false,
                }

                rect2 = {
                    obj_type: 'rect',
                    startX: 800,
                    startY: 800,
                    width: 100,
                    height: 100,
                    fill_color: 'white',
                    show_start_frame: 36,
                    show_end_frame: 39, // Rect2 is presented for 3 frames (50 ms), 6 frames (100 ms) after Rect1 is presented (i.e., SOA = 100 ms).
                    is_frame: true,
                    origin_center: false,
                }

                sound_object = {
                    obj_type: 'sound',
                    file: sounds[0],
                    show_start_frame: 36, // The sound is presented for 100 ms, 100 ms after Rect1 is presented (i.e., SOA = 100 ms).
                    // In addition, the sound is presented at the same time of the onset of Rect2.
                    // Note that the duration of the sound is depend on the audio file.
                    is_frame: true
                }
            }

            const instruction2 = {
                type: jsPsychHtmlKeyboardResponse,
                // stimulus: '<p>This program uses the jspsych-psychophysics plugin.</p><p>Press any key to start.</p>'
                stimulus: `<p class="text-white"> ${pixi_flag ? "Pixi.js is used." : "Pixi.js is not used."}<br>Time unit: ${units}<br>Press any key to start the trial.</p>`,
            }
            experiment.push(instruction2)


            for (let repeat = 0; repeat < 100; repeat++){
                const trial_time = 800+500;

                const show_rect_sound = {
                    type: jsPsychPsychophysics,
                    pixi: pixi_flag,
                    stimuli: [rect1, rect2, sound_object],
                    trial_duration: trial_time,
                    response_ends_trial: false,
                    background_color: 'black',
                    // canvas_width: 900,
                    // canvas_height: 600,
                }

                experiment.push(show_rect_sound);
            }        
        })

    })

    const exit_fullscreen = {
        type: jsPsychFullscreen,
        fullscreen_mode: false,
        delay_after: 0,
    }
    experiment.push(exit_fullscreen)

    const end_trial = {
        type: jsPsychHtmlKeyboardResponse,
        // stimulus: '<p>The program is finished.</p>'
        stimulus: ''
    }

    experiment.push(end_trial)
    jsPsych.run(experiment)
    
</script>

</html>
