<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.10/browser/pixi.js" integrity="sha512-aUDaFsR+MTUl1ZTKRniY6kX38CysOAqoHiuBlip8rcRF0MH+5MhE9YnBcD7n7KYtB4pPorRJD042zMnkSyoZfQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../jspsych-psychophysics.js"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
    p {
        color: white;
    }
    body, 
    .jspsych-display-element, 
    .jspsych-content-wrapper, 
    #jspsych-content {
        background-color: black !important;
    }    
    .text-white {
        color: white;
    }
  </style>
</head>
<body></body>
<script>
    // The accuracy of the psychophysics plugin was confirmed using this script.
    // See https://osf.io/pj4sb/

    const jsPsych = initJsPsych({
        on_finish: function() {
            pixi_app.destroy(true, {
                children: true,
                texture: true,
                baseTexture: true,});
        }
    })
    console.log(`jsPsych Version ${jsPsych.version()}`)

    const instruction = {
        type: jsPsychHtmlKeyboardResponse,
        // stimulus: '<p>This program uses the jspsych-psychophysics plugin.</p><p>Press any key to start.</p>'
        stimulus: ''
    }

    const experiment = [];

    const sounds = [
        './sound/tone100ms.wav'
    ];

    const preload = {
        type: jsPsychPreload,
        audio: sounds,
    }

    const enter_fullscreen = {
        type: jsPsychFullscreen,
        fullscreen_mode: true,
    }

    experiment.push(preload)
    experiment.push(enter_fullscreen)
    // experiment.push(instruction);

    const time_units = ["millisecond", "frame"]
    const pixi_settings = [true]

    const pixi_app = new PIXI.Application({
        backgroundColor: 0x0000FF,
    });

    pixi_settings.forEach(pixi_flag => {
        time_units.forEach(units => {
            let rect1;
            let rect2;
            let sound_object;

            if (units === "millisecond") {
                rect1 = {
                    obj_type: 'rect',
                    startX: 300,
                    startY: 200,
                    width: 100,
                    height: 100,
                    fill_color: 'white',
                    show_start_time: 0,
                    show_end_time: 50, // Rect1 is presented for 50 ms. 
                    is_frame: false,
                    origin_center: false,
                }

                rect2 = {
                    obj_type: 'rect',
                    startX: 800,
                    startY: 800,
                    width: 100,
                    height: 100,
                    fill_color: 'white',
                    show_start_time: 100,
                    show_end_time: 150, // Rect2 is presented for 50 ms, 100 ms after Rect1 is presented (i.e., SOA = 100 ms).
                    is_frame: false,
                    origin_center: false,
                }

                sound_object = {
                    obj_type: 'sound',
                    file: sounds[0],
                    show_start_time: 100, // The sound is presented for 100 ms, 100 ms after Rect1 is presented (i.e., SOA = 100 ms).
                    // In addition, the sound is presented at the same time of the onset of Rect2.
                    // Note that the duration of the sound is depend on the audio file.
                    is_frame: false
                }

            } else { // in terms of frames
                rect1 = {
                    obj_type: 'rect',
                    startX: 300,
                    startY: 200,
                    width: 100,
                    height: 100,
                    fill_color: 'white',
                    show_start_frame: 0,
                    show_end_frame: 3, // Rect1 is presented for 3 frames (50 ms). 
                    is_frame: true,
                    origin_center: false,
                }

                rect2 = {
                    obj_type: 'rect',
                    startX: 800,
                    startY: 800,
                    width: 100,
                    height: 100,
                    fill_color: 'white',
                    show_start_frame: 6,
                    show_end_frame: 9, // Rect2 is presented for 3 frames (50 ms), 6 frames (100 ms) after Rect1 is presented (i.e., SOA = 100 ms).
                    is_frame: true,
                    origin_center: false,
                }

                sound_object = {
                    obj_type: 'sound',
                    file: sounds[0],
                    show_start_frame: 6, // The sound is presented for 100 ms, 100 ms after Rect1 is presented (i.e., SOA = 100 ms).
                    // In addition, the sound is presented at the same time of the onset of Rect2.
                    // Note that the duration of the sound is depend on the audio file.
                    is_frame: true
                }
            }

            const instruction2 = {
                type: jsPsychHtmlKeyboardResponse,
                // stimulus: '<p>This program uses the jspsych-psychophysics plugin.</p><p>Press any key to start.</p>'
                stimulus: `<p class="text-white"> ${pixi_flag ? "Pixi.js is used." : "Pixi.js is not used."}<br>Time unit: ${units}<br>Press any key to start the trial.</p>`,
            }
            experiment.push(instruction2)

            const blank = {
                type: jsPsychHtmlKeyboardResponse,
                // stimulus: '<p>This program uses the jspsych-psychophysics plugin.</p><p>Press any key to start.</p>'
                stimulus: '',
                trial_duration: 1000,
            }

            for (let repeat = 0; repeat < 100; repeat++){
                const trial_time = 800;
                // const trial_time = 1800;

                const show_rect_sound = {
                    type: jsPsychPsychophysics,
                    pixi: pixi_flag,
                    pixi_app: function() { 
                        const a = 10;
                        return pixi_app; },
                    stimuli: [rect1, rect2, sound_object],
                    trial_duration: trial_time,
                    response_ends_trial: false,
                    background_color: 'black',
                    // canvas_width: 900,
                    // canvas_height: 600,
                }

                experiment.push(show_rect_sound);
                // experiment.push(blank);
            }        
        })

    })

    const exit_fullscreen = {
        type: jsPsychFullscreen,
        fullscreen_mode: false,
        delay_after: 0,
    }
    experiment.push(exit_fullscreen)

    const end_trial = {
        type: jsPsychHtmlKeyboardResponse,
        // stimulus: '<p>The program is finished.</p>'
        stimulus: ''
    }

    experiment.push(end_trial)
    jsPsych.run(experiment)
    
</script>

</html>
