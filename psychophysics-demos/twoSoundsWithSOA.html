<!DOCTYPE html>
<html>
<head>
    <script src="../jspsych-dist/dist/jspsych.js"></script>
    <script src="../jspsych-dist/dist/plugin-html-button-response.js"></script>
    <script src="../jspsych-dist/dist/plugin-preload.js"></script>
    <script src="../jspsych-psychophysics.js"></script>
    <link rel="stylesheet" href="../jspsych-dist/dist/jspsych.css"></link>
</head>
<body></body>
<script>
    // This file demonstrates how to present sounds with 1000-ms SOA.
    // Note that the experimental files (html, js, and audio) must be uploaded in a web-server to run.

    const jsPsych = initJsPsych({
        // use_webaudio: false, // If you don't want to use webaudio
        on_finish: function() {
            jsPsych.data.displayData();
        }
    })
    console.log(`jsPsych Version ${jsPsych.version()}`)

    const sounds = [ // All the sound files used in this demo
        './sound/tone100ms.wav',
        './sound/880Hz_100ms.wav'
    ];

    // When using audio stimuli, there is a possibility that the playback of the sound in the first trial will be delayed.
    // To resolve this issue, it is recommended to play a sound beforehand, which likely allows the system to prepare for subsequent audio playback.
    const preplay_sound = {
        type: jsPsychPsychophysics,
        stimuli: [
            {
                obj_type: 'sound',
                file: "./sound/tone500ms.wav"
            }
        ],
        trial_duration: 500,
        background_color: 'black',
    }

    const all_sound_files = sounds.concat("./sound/tone500ms.wav")

    // Preloading files are needed to present the stimuli accurately.
    const preload = {
        type: jsPsychPreload,
        audio: all_sound_files,
    }

    const trial = {
        timeline: [
            {
                type: jsPsychPsychophysics,
                on_load: function(){
                    console.log("on_load")
                },
                response_start_time: 1600, // To prevent participants from responding before the auditory stimuli are presented
                stimuli: [
                    {
                        obj_type: 'sound',
                        file: function(){
                            return jsPsych.evaluateTimelineVariable('first_sound')
                        },
                        show_start_time: 500 // from the trial start (ms)
                    },
                    {
                        obj_type: 'sound',
                        file: function(){
                            return jsPsych.evaluateTimelineVariable('second_sound')
                        },
                        show_start_time: 1500 // from the trial start (ms)
                    },
                ],
                choices: ['y', 'n'], // The participant can respond to the stimuli using the 'y' or 'n' key.
                prompt: 'Press the Y or N key to respond.',
                canvas_height: 500
            },
        ],
        timeline_variables:[
            {first_sound: sounds[0], second_sound: sounds[1]}
        ],
        repetitions: 3
    }

    // See also jspsych-audio-keyboard-response.html
    const pre_audio = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `<p>Recent versions of Chrome require the user to interact with a page before it can play audio. </p>
            <p>Clicking the button below counts as an interaction. </p>
            <p>Be aware of this when planning audio experiments if you want the first trial to include audio.</p>`,
        choices: ['Continue']
    }

    const instruction = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `<p>Are you ready?</p>`,
        choices: ['START']
    }

    jsPsych.run([preload, pre_audio, preplay_sound, instruction, trial])
    
</script>

</html>
